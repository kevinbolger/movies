<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Cinematic Archives | Top 10 Movies by Year</title>
    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Explore the top 10 movies by year across Box Office, Critically Acclaimed, Award Winning, and Cult Classics. A beautiful interactive database.">

    <link rel="stylesheet" href="index.css?v=4">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar / Filters -->
        <aside class="sidebar">
            <div class="logo">
                <h1>Cinematic Archives</h1>
                <p>Top 10 Movies by Year</p>
            </div>

            <button id="luckyBtn" class="lucky-btn">🎲 I'm Feeling Lucky</button>

            <div class="filters">
                <div class="filter-group">
                    <label for="titleInput">Title</label>
                    <input type="text" id="titleInput" placeholder="Search by title...">
                </div>
                <div class="filter-group">
                    <label for="directorInput">Director</label>
                    <input type="text" id="directorInput" placeholder="Search by director...">
                </div>
                <div class="filter-group">
                    <label for="categoryInput">Category</label>
                    <div class="ms-container" id="categoryMultiSelect">
                        <div class="ms-search-box">
                            <div class="ms-pills" id="categoryPills"></div>
                            <input type="text" id="categoryInput" placeholder="All Categories" autocomplete="off">
                        </div>
                        <div class="ms-dropdown" id="categoryDropdown"></div>
                    </div>
                </div>
                <div class="filter-group">
                    <label for="genreInput">Genre</label>
                    <div class="ms-container" id="genreMultiSelect">
                        <div class="ms-search-box">
                            <div class="ms-pills" id="genrePills"></div>
                            <input type="text" id="genreInput" placeholder="All Genres" autocomplete="off">
                        </div>
                        <div class="ms-dropdown" id="genreDropdown"></div>
                    </div>
                </div>
                <div class="filter-group">
                    <label>Year Range</label>
                    <div class="year-range-inputs" style="display: flex; gap: 0.5rem;">
                        <input type="number" id="yearMinInput" list="yearList" placeholder="From">
                        <input type="number" id="yearMaxInput" list="yearList" placeholder="To">
                    </div>
                    <datalist id="yearList"></datalist>
                </div>
                <div class="filter-group">
                    <label>Rank Range (1-10)</label>
                    <div class="rank-range-inputs" style="display: flex; gap: 0.5rem;">
                        <input type="number" id="rankMinInput" placeholder="Min (1)" min="1" max="10">
                        <input type="number" id="rankMaxInput" placeholder="Max (10)" min="1" max="10">
                    </div>
                </div>
                <div class="filter-group">
                    <label for="minCatInput">Min # of Categories</label>
                    <input type="number" id="minCatInput" placeholder="e.g. 2 for Multi-Ranked Only" min="1" max="5">
                </div>
                <div class="stats" id="statsContainer">
                    <!-- Stats dynamically loaded -->
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h2 id="currentCategoryText">All Categories</h2>
                <div class="sort-controls">
                    <select id="sortSelect" aria-label="Sort By">
                        <option value="year-desc">Newest First</option>
                        <option value="year-asc">Oldest First</option>
                        <option value="rank-asc">Rank: 1 to 10</option>
                        <option value="rank-desc">Rank: 10 to 1</option>
                    </select>
                </div>
            </header>

            <div id="loading" class="loading">Loading database...</div>

            <div id="movieGrid" class="movie-grid">
                <!-- Movie cards dynamically generated -->
            </div>
        </main>
    </div>

    <!-- Randomizer Modal -->
    <div id="movieModal" class="modal-overlay">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" id="modalClose">&times;</button>
            <div id="modalCardContainer"></div>
        </div>
    </div>

    <script src="data.js?v=6"></script>
    <script src="app.js?v=20"></script>
</body>

</html>
